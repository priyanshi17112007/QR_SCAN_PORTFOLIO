{% extends "base.html" %}
{% block title %}Sign In - AI Smart QR Portfolio{% endblock %}
{% block content %}
<div class="flex min-h-screen items-center justify-center p-6">
    <div class="w-full max-w-md p-8 rounded-2xl glass-dark shadow-2xl relative overflow-hidden">
        <div class="absolute -top-10 -left-10 w-40 h-40 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
        <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-cyan-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

        <div class="text-center mb-8 relative">
            <div class="mx-auto w-16 h-16 bg-gradient-to-tr from-indigo-500 to-cyan-400 rounded-2xl flex items-center justify-center shadow-lg mb-4">
                <i class="fas fa-qrcode text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight">Welcome Back</h1>
            <p class="text-sm text-slate-400 mt-2">Log in to update your smart profile layout</p>
        </div>

        <form action="/auth/login" method="POST" class="space-y-6 relative">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required placeholder="name@college.edu" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-900/50 border border-slate-700/50 rounded-xl focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none transition text-slate-100">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" name="password" required placeholder="••••••••" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-900/50 border border-slate-700/50 rounded-xl focus:ring-2 focus:ring-cyan-500 focus:border-transparent outline-none transition text-slate-100">
                </div>
            </div>

            <button type="submit" class="w-full py-3 bg-gradient-to-r from-indigo-600 to-cyan-500 text-white font-semibold rounded-xl hover:opacity-90 transition transform active:scale-95 shadow-lg">
                Authenticate Securely
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-400 relative">
            Don't have an account? 
            <a href="/register" class="text-cyan-400 hover:underline">Create an account</a>
        </div>
    </div>
</div>
{% endblock %}
